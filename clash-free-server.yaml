proxy-groups:
  - type: select
    name: 🚀 节点选择
    proxies:
      - ⚡ 自动选择
      - 🖐️ 手动切换
      - 🇯🇵 Japan
      - 🇺🇸 United States
      - DIRECT
      - REJECT
  - name: ⚡ 自动选择
    type: url-test
    proxies:
      - 美国+Fastly全球Anycast节点
      - 日本+东京Fastly节点
      - 美国+V2CROSS.COM
      - 乌克兰+V2CROSS.COM
      - 日本+东京Fastly节点 2
      - 美国+V2CROSS.COM 2
    url: https://www.gstatic.com/generate_204
    interval: 300
    lazy: false
  - name: 🖐️ 手动切换
    type: select
    proxies:
      - 美国+Fastly全球Anycast节点
      - 日本+东京Fastly节点
      - 美国+V2CROSS.COM
      - 乌克兰+V2CROSS.COM
      - 日本+东京Fastly节点 2
      - 美国+V2CROSS.COM 2
  - name: 🇯🇵 Japan
    type: url-test
    proxies:
      - 日本+东京Fastly节点
      - 日本+东京Fastly节点 2
    url: https://www.gstatic.com/generate_204
    interval: 300
    lazy: false
  - name: 🇺🇸 United States
    type: url-test
    proxies:
      - 美国+Fastly全球Anycast节点
      - 美国+V2CROSS.COM
      - 美国+V2CROSS.COM 2
    url: https://www.gstatic.com/generate_204
    interval: 300
    lazy: false
