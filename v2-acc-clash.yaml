port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: >-
    https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: >-
    https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: >-
    https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb
rule-providers:
  category-ai-!cn:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ai-!cn.mrs
    path: ./ruleset/category-ai-!cn.mrs
    interval: 86400
  youtube:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/youtube.mrs
    path: ./ruleset/youtube.mrs
    interval: 86400
  google:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google.mrs
    path: ./ruleset/google.mrs
    interval: 86400
  geolocation-cn:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-cn.mrs
    path: ./ruleset/geolocation-cn.mrs
    interval: 86400
  cn:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs
    path: ./ruleset/cn.mrs
    interval: 86400
  github:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/github.mrs
    path: ./ruleset/github.mrs
    interval: 86400
  gitlab:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/gitlab.mrs
    path: ./ruleset/gitlab.mrs
    interval: 86400
  geolocation-!cn:
    type: http
    format: mrs
    behavior: domain
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-!cn.mrs
    path: ./ruleset/geolocation-!cn.mrs
    interval: 86400
  google-ip:
    type: http
    format: mrs
    behavior: ipcidr
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/google.mrs
    path: ./ruleset/google-ip.mrs
    interval: 86400
  private-ip:
    type: http
    format: mrs
    behavior: ipcidr
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs
    path: ./ruleset/private-ip.mrs
    interval: 86400
  cn-ip:
    type: http
    format: mrs
    behavior: ipcidr
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs
    path: ./ruleset/cn-ip.mrs
    interval: 86400
  telegram-ip:
    type: http
    format: mrs
    behavior: ipcidr
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs
    path: ./ruleset/telegram-ip.mrs
    interval: 86400
dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  nameserver-policy:
    geosite:cn,private:
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
    geosite:geolocation-!cn:
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query
proxies:
  - name: 431
    type: vmess
    server: 1.1.1.1
    port: 443
    uuid: 418048af-a293-4b99-9b0c-98ca3580dd24
    alterId: 64
    cipher: auto
    tls: true
    servername: ''
    skip-cert-verify: false
    network: ws
    ws-opts:
      path: /footers
      headers:
        host: www.google.com
    udp: true
proxy-groups:
  - type: select
    name: 🚀 节点选择
    proxies:
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - name: 🖐️ 手动切换
    type: select
    proxies: []
  - type: select
    name: 💬 AI 服务
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - type: select
    name: 📹 油管视频
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - type: select
    name: 🔍 谷歌服务
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - type: select
    name: 🏠 私有网络
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🖐️ 手动切换
      - REJECT
  - type: select
    name: 🔒 国内服务
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🖐️ 手动切换
      - REJECT
  - type: select
    name: 📲 电报消息
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - type: select
    name: 🐱 Github
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - type: select
    name: 🌐 非中国
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
  - type: select
    name: 🐟 漏网之鱼
    proxies:
      - 🚀 节点选择
      - 🖐️ 手动切换
      - DIRECT
      - REJECT
rules:
  - RULE-SET,category-ai-!cn,💬 AI 服务
  - RULE-SET,youtube,📹 油管视频
  - RULE-SET,google,🔍 谷歌服务
  - RULE-SET,geolocation-cn,🔒 国内服务
  - RULE-SET,cn,🔒 国内服务
  - RULE-SET,github,🐱 Github
  - RULE-SET,gitlab,🐱 Github
  - RULE-SET,geolocation-!cn,🌐 非中国
  - RULE-SET,google-ip,🔍 谷歌服务,no-resolve
  - RULE-SET,private-ip,🏠 私有网络,no-resolve
  - RULE-SET,cn-ip,🔒 国内服务,no-resolve
  - RULE-SET,telegram-ip,📲 电报消息,no-resolve
  - MATCH,🐟 漏网之鱼
